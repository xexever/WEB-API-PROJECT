<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>{{ title }} | Fun & Learn English</title>
    <style>
        body {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, #2e7d32, #1b5e20) !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        /* Кнопка профиля (имя пользователя) */
        .btn-profile {
            background-color: #1b5e20;
            border-color: #2e7d32;
            color: white;
        }
        .btn-profile:hover {
            background-color: #2e7d32;
            border-color: #43a047;
            color: white;
        }
        /* Кнопка Logout — темно-зеленая */
        .btn-logout {
            background-color: #1b5e20;
            border-color: #2e7d32;
            color: #f0f0f0;
        }
        .btn-logout:hover {
            background-color: #2e7d32;
            border-color: #43a047;
            color: white;
        }
        .btn-success, .btn-primary {
            background: linear-gradient(135deg, #43a047, #2e7d32);
            border: none;
        }
        .btn-success:hover, .btn-primary:hover {
            background: linear-gradient(135deg, #388e3c, #1b5e20);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46,125,50,0.3);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card-header {
            background: linear-gradient(135deg, #43a047, #2e7d32);
            border-radius: 15px 15px 0 0 !important;
            color: white;
        }
        .card-header.bg-info { background: linear-gradient(135deg, #0288d1, #01579b) !important; }
        .btn-outline-primary {
            border: 2px solid #43a047;
            color: #43a047;
            background: white;
        }
        .btn-outline-primary:hover {
            background: #43a047;
            color: white;
        }
        .text-success { color: #2e7d32 !important; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease-in; }
    </style>
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-leaf"></i> FunLearn English</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                {% if current_user.is_authenticated %}
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item"><a class="nav-link" href="/generate_idea"><i class="fas fa-magic"></i> Generator</a></li>
                    <li class="nav-item"><a class="nav-link" href="/public_ideas"><i class="fas fa-users"></i> Community</a></li>
                    <li class="nav-item"><a class="nav-link" href="/my_ideas"><i class="fas fa-bookmark"></i> My Ideas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/my_favorites"><i class="fas fa-heart"></i> Favorites</a></li>
                </ul>
                {% endif %}
                <div class="ml-auto">
                    {% if current_user.is_authenticated %}
                        <!-- Имя пользователя на темно-зеленой кнопке, текст белый -->
                        <a class="btn btn-profile btn-sm rounded-pill" href="{{ url_for('profile', user_id=current_user.id) }}">
                            <i class="fas fa-user-circle"></i> {{ current_user.name }}
                        </a>
                        <!-- Logout — темно-зеленая кнопка -->
                        <a class="btn btn-logout btn-sm rounded-pill ml-2" href="/logout">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    {% else %}
                        <a class="btn btn-outline-primary btn-sm rounded-pill" href="/register">
                            <i class="fas fa-user-plus"></i> Sign Up
                        </a>
                        <a class="btn btn-primary btn-sm rounded-pill ml-2" href="/login">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
</header>

<main role="main" class="container mt-4">
    {% block content %}{% endblock %}
</main>

<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
</body>
</html>
